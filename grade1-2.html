<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1–2年级故事库 · 小故事家</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1a2e;--paper:#fdfaf4;--warm:#f5ede0;--accent:#e07b39;--muted:#7a6f63;--border:rgba(26,26,46,0.1);--radius:16px;--shadow:0 4px 20px rgba(26,26,46,0.07)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:'Noto Serif SC',serif;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 30%,rgba(224,123,57,.05) 0%,transparent 50%);pointer-events:none;z-index:0}
.container{max-width:880px;margin:0 auto;padding:0 20px;position:relative;z-index:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(253,250,244,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:11px 20px}
.nav-inner{max-width:880px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
.nav-logo{font-family:'Ma Shan Zheng',cursive;font-size:1.1rem;color:var(--ink);text-decoration:none}
.nav-links{display:flex;gap:5px;flex-wrap:wrap}
.nav-link{font-size:.76rem;font-family:'ZCOOL XiaoWei',serif;color:var(--muted);text-decoration:none;padding:4px 10px;border-radius:50px;transition:background .2s,color .2s}
.nav-link:hover{background:var(--warm);color:var(--ink)}
.nav-link.cur{background:var(--accent);color:#fff}


/* PAGE HEADER */
.page-header{padding:44px 20px 32px;text-align:center}
.grade-badge{display:inline-flex;align-items:center;gap:6px;background:#fff5ee;border:1px solid rgba(224,123,57,.25);border-radius:50px;padding:5px 14px;font-family:'ZCOOL XiaoWei',serif;font-size:.76rem;color:var(--accent);letter-spacing:1.5px;margin-bottom:14px}
.page-title{font-family:'Ma Shan Zheng',cursive;font-size:clamp(1.8rem,5vw,2.8rem);margin-bottom:8px}
.page-sub{font-size:.9rem;color:var(--muted);line-height:1.8;max-width:500px;margin:0 auto 20px}
.page-stats{display:flex;justify-content:center;gap:22px;flex-wrap:wrap}
.ps-item{text-align:center}
.ps-num{font-family:'Ma Shan Zheng',cursive;font-size:1.6rem;color:var(--accent);display:block}
.ps-lbl{font-size:.75rem;color:var(--muted)}

/* FRAMEWORK MINI */
.framework-mini{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:32px;box-shadow:var(--shadow)}
.fm-title{font-family:'ZCOOL XiaoWei',serif;font-size:.9rem;color:var(--muted);margin-bottom:10px;letter-spacing:1px}
.fm-steps{display:flex;gap:6px;flex-wrap:wrap}
.fm-step{display:flex;align-items:center;gap:5px;background:var(--warm);border-radius:8px;padding:5px 10px;font-size:.78rem}
.fm-dot{width:18px;height:18px;border-radius:50%;color:#fff;font-size:.65rem;display:flex;align-items:center;justify-content:center;font-family:'Ma Shan Zheng',cursive;flex-shrink:0}
.d1{background:#e07b39}.d2{background:#e05656}.d3{background:#2eaa6e}

/* FILTER */
.filter-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:28px;align-items:center}
.filter-label{font-size:.8rem;color:var(--muted);font-family:'ZCOOL XiaoWei',serif;margin-right:3px}
.ftag{background:#fff;border:1px solid var(--border);border-radius:50px;padding:5px 13px;font-size:.78rem;cursor:pointer;transition:all .2s;font-family:'ZCOOL XiaoWei',serif;color:var(--muted)}
.ftag:hover{border-color:var(--accent);color:var(--accent)}
.ftag.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* STORY GRID */
.stories-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.story-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);cursor:pointer;transition:transform .2s,box-shadow .2s;animation:fadeUp .4s ease backwards;position:relative}
.story-card:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(26,26,46,.11)}
.story-card.hidden{display:none}
.sc-num{position:absolute;top:14px;right:14px;font-family:'Ma Shan Zheng',cursive;font-size:.75rem;color:var(--muted);background:var(--warm);border-radius:50px;padding:2px 8px}
.sc-emoji{font-size:2.2rem;display:block;margin-bottom:8px}
.sc-dim{display:inline-block;font-size:.68rem;font-family:'ZCOOL XiaoWei',serif;padding:2px 8px;border-radius:50px;margin-bottom:7px;letter-spacing:.5px}
.sc-title{font-family:'Ma Shan Zheng',cursive;font-size:1.1rem;margin-bottom:6px}
.sc-preview{font-size:.8rem;color:var(--muted);line-height:1.65;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sc-tags{display:flex;gap:5px;flex-wrap:wrap}
.sc-tag{font-size:.68rem;background:var(--warm);color:var(--muted);border-radius:5px;padding:2px 6px}
.sc-open{display:inline-flex;align-items:center;gap:4px;font-size:.76rem;color:var(--accent);font-family:'ZCOOL XiaoWei',serif;margin-top:8px}

/* DIM COLORS */
.dim-zr{background:#e8f5e9;color:#2e7d32}
.dim-yy{background:#e3f2fd;color:#1565c0}
.dim-yq{background:#fce4ec;color:#880e4f}
.dim-lj{background:#ede7f6;color:#4527a0}
.dim-wh{background:#fff3e0;color:#e65100}
.dim-qx{background:#fce4ec;color:#c62828}
.dim-jt{background:#f3e5f5;color:#6a1b9a}
.dim-kx{background:#e0f2f1;color:#00695c}
.dim-cy{background:#fff8e1;color:#f57f17}
.dim-gp{background:#efebe9;color:#4e342e}
.dim-sz{background:#e8eaf6;color:#283593}
.dim-ls{background:#fafafa;color:#424242}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,10,20,.5);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--paper);border-radius:20px;padding:28px;max-width:620px;width:100%;margin:auto;position:relative;box-shadow:0 20px 60px rgba(10,10,20,.2);animation:fadeUp .3s ease}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;background:var(--warm);border:none;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.modal-close:hover{background:var(--accent);color:#fff}
.modal-num{font-family:'ZCOOL XiaoWei',serif;font-size:.75rem;color:var(--muted);margin-bottom:4px}
.modal-emoji{font-size:2.8rem;display:block;margin-bottom:8px}
.modal-title{font-family:'Ma Shan Zheng',cursive;font-size:1.7rem;margin-bottom:12px}
.modal-dim{display:inline-block;font-size:.72rem;font-family:'ZCOOL XiaoWei',serif;padding:3px 10px;border-radius:50px;margin-bottom:16px}

/* story sections */
.story-section{margin-bottom:16px}
.ss-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ss-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.ss-step{font-family:'ZCOOL XiaoWei',serif;font-size:.82rem;color:var(--muted)}
.ss-name{font-family:'ZCOOL XiaoWei',serif;font-size:.95rem;color:var(--ink)}
.ss-body{font-size:.9rem;line-height:1.85;color:var(--ink)}

/* guide box */
.guide-box{background:var(--warm);border-radius:12px;padding:14px 16px;margin-top:16px}
.guide-title{font-family:'ZCOOL XiaoWei',serif;font-size:.85rem;color:var(--accent);margin-bottom:8px}
.guide-q{font-size:.83rem;line-height:1.7;color:var(--ink);margin-bottom:4px}
.guide-q::before{content:"❓ "}

/* retell box */
.retell-box{background:#eefff5;border:1px solid rgba(46,170,110,.2);border-radius:12px;padding:14px 16px;margin-top:12px}
.retell-title{font-family:'ZCOOL XiaoWei',serif;font-size:.85rem;color:#2eaa6e;margin-bottom:8px}
.retell-step{display:flex;align-items:center;gap:7px;font-size:.82rem;line-height:1.6;margin-bottom:4px;color:var(--ink)}
.retell-dot{width:16px;height:16px;border-radius:50%;background:#2eaa6e;color:#fff;font-size:.6rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Ma Shan Zheng',cursive}

/* nav arrows in modal */
.modal-nav{display:flex;justify-content:space-between;margin-top:20px;gap:10px}
.mnav-btn{flex:1;background:#fff;border:1px solid var(--border);border-radius:10px;padding:9px 14px;font-family:'ZCOOL XiaoWei',serif;font-size:.82rem;cursor:pointer;color:var(--muted);transition:all .2s;text-align:center}
.mnav-btn:hover{border-color:var(--accent);color:var(--accent)}
.mnav-btn:disabled{opacity:.35;cursor:default}

/* empty */
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:.9rem}

footer{text-align:center;padding:32px 20px;font-size:.78rem;color:var(--muted);border-top:1px solid var(--border);margin-top:40px}
footer a{color:var(--accent);text-decoration:none}

/* ── MOBILE NAV FIX ── */
.nav-links{display:flex;gap:5px;flex-wrap:wrap}
.hamburger{display:none;background:none;border:1px solid var(--border);border-radius:8px;padding:5px 9px;cursor:pointer;font-size:1.1rem;color:var(--ink)}
.mobile-menu{display:none;position:fixed;inset:0;background:rgba(10,10,20,.45);z-index:999}
.mobile-menu.open{display:block}
.mobile-menu-inner{position:absolute;top:0;right:0;width:220px;height:100%;background:var(--paper);padding:60px 20px 20px;box-shadow:-4px 0 24px rgba(10,10,20,.12);display:flex;flex-direction:column;gap:6px}
.mobile-menu-inner a{font-family:'ZCOOL XiaoWei',serif;font-size:1rem;color:var(--ink);text-decoration:none;padding:10px 14px;border-radius:10px;transition:background .2s}
.mobile-menu-inner a:hover,.mobile-menu-inner a.cur{background:var(--warm)}
.mobile-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted)}
@media(max-width:560px){
  .nav-links{display:none!important}
  .hamburger{display:block}
}

</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">📖 小故事家</a>
    <button class="hamburger" onclick="openMenu()" aria-label="菜单">☰</button>
    <div class="nav-links">
      <a href="index.html" class="nav-link">首页</a>
      <a href="grade1-2.html" class="nav-link cur">1–2年级</a>
      <a href="grade3-4.html" class="nav-link">3–4年级</a>
      <a href="grade5-6.html" class="nav-link">5–6年级</a>
      <a href="planner.html" class="nav-link">每日计划</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <div class="grade-badge">🌱 1–2 年级 · 萌芽故事家</div>
    <div class="page-title">30 个好故事，讲给你听</div>
    <div class="page-sub">每个故事用「背景→问题→结果」三步来讲，简单清楚。家长引导，孩子跟着说，慢慢就会自己讲啦！</div>
    <div class="page-stats">
      <div class="ps-item"><span class="ps-num">30</span><span class="ps-lbl">个故事</span></div>
      <div class="ps-item"><span class="ps-num">12</span><span class="ps-lbl">个维度</span></div>
      <div class="ps-item"><span class="ps-num">3</span><span class="ps-lbl">步框架</span></div>
      <div class="ps-item"><span class="ps-num">5–8</span><span class="ps-lbl">分钟/天</span></div>
    </div>
  </div>
</div>

<div style="height:1px;background:var(--border)"></div>

<div style="padding:24px 0 0">
  <div class="container">

    <!-- Framework mini reminder -->
    <div class="framework-mini">
      <div class="fm-title">📐 本年级使用框架（简化三步）</div>
      <div class="fm-steps">
        <div class="fm-step"><div class="fm-dot d1">①</div><span>🌍 背景 — 谁？在哪？</span></div>
        <div class="fm-step"><div class="fm-dot d2">②</div><span>😟 问题 — 遇到什么麻烦？</span></div>
        <div class="fm-step"><div class="fm-dot d3">③</div><span>🏆 结果 — 最后怎样了？</span></div>
      </div>
    </div>

    <!-- Filter -->
    <div class="filter-bar">
      <span class="filter-label">筛选维度：</span>
      <button class="ftag on" data-dim="all" onclick="filter(this)">全部</button>
      <button class="ftag" data-dim="自然与生命" onclick="filter(this)">🌱 自然</button>
      <button class="ftag" data-dim="友谊与合作" onclick="filter(this)">🤝 友谊</button>
      <button class="ftag" data-dim="勇气与成长" onclick="filter(this)">💪 勇气</button>
      <button class="ftag" data-dim="逻辑与解题" onclick="filter(this)">🧠 逻辑</button>
      <button class="ftag" data-dim="文化与多元" onclick="filter(this)">🌍 文化</button>
      <button class="ftag" data-dim="情绪与同理心" onclick="filter(this)">❤️ 情绪</button>
      <button class="ftag" data-dim="家庭与社区" onclick="filter(this)">🏠 家庭</button>
      <button class="ftag" data-dim="科学与探索" onclick="filter(this)">🔬 科学</button>
      <button class="ftag" data-dim="创意与想象" onclick="filter(this)">🎨 创意</button>
      <button class="ftag" data-dim="公平与责任" onclick="filter(this)">⚖️ 公平</button>
      <button class="ftag" data-dim="数字与科技" onclick="filter(this)">🖥️ 科技</button>
      <button class="ftag" data-dim="历史与传统" onclick="filter(this)">🏛️ 历史</button>
    </div>

    <!-- Grid -->
    <div class="stories-grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">没有找到该维度的故事</div>

  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
    <div class="modal-nav">
      <button class="mnav-btn" id="btn-prev" onclick="navigate(-1)">← 上一个故事</button>
      <button class="mnav-btn" id="btn-next" onclick="navigate(1)">下一个故事 →</button>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    <p><a href="index.html">← 返回首页</a> · 小故事家 · 1–2年级故事库</p>
  </div>
</footer>

<script>
const DIM_COLOR = {
  "自然与生命":"dim-zr","友谊与合作":"dim-yy","勇气与成长":"dim-yq",
  "逻辑与解题":"dim-lj","文化与多元":"dim-wh","情绪与同理心":"dim-qx",
  "家庭与社区":"dim-jt","科学与探索":"dim-kx","创意与想象":"dim-cy",
  "公平与责任":"dim-gp","数字与科技":"dim-sz","历史与传统":"dim-ls"
};
const DIM_EMOJI = {
  "自然与生命":"🌱","友谊与合作":"🤝","勇气与成长":"💪","逻辑与解题":"🧠",
  "文化与多元":"🌍","情绪与同理心":"❤️","家庭与社区":"🏠","科学与探索":"🔬",
  "创意与想象":"🎨","公平与责任":"⚖️","数字与科技":"🖥️","历史与传统":"🏛️"
};
const STEP_COLORS = ["#e07b39","#e05656","#2eaa6e"];

const stories = [
  /* 1 - 自然与生命 */
  {
    id:1, emoji:"🐛", dim:"自然与生命", title:"毛毛虫的翅膀梦",
    tags:["成长","变化","坚持"],
    preview:"小毛毛虫豆豆每天看着蝴蝶飞，心里有一个大大的梦想……",
    bg:"森林里有一条小毛毛虫叫豆豆。她住在一片大叶子下面，每天看着蝴蝶在花丛里飞来飞去。",
    problem:"豆豆最大的梦想是能飞起来，可是她只有小小的腿，根本飞不了。小伙伴们说：「你是虫子，永远都飞不起来！」豆豆很难过。",
    action:"豆豆没有放弃。她每天努力吃叶子积累力量，然后勇敢地把自己裹进了一个茧里。黑暗中她等啊等，有时候很害怕，但还是坚持住了。",
    twist:"有一天，茧突然破了！豆豆从里面钻出来，发现背上长出了两片美丽的彩色翅膀！",
    result:"豆豆变成了一只漂亮的蝴蝶，飞过了整片森林。她学到：改变需要勇气和等待，但一定会来。",
    guide:["豆豆住在哪里？她的梦想是什么？","为什么豆豆把自己裹进了茧里？","你有没有做到过一件以前觉得很难的事？"],
    retell:["豆豆是一只住在森林里的……","她遇到的麻烦是……","最后她变成了……"]
  },
  /* 2 - 自然与生命 */
  {
    id:2, emoji:"🌱", dim:"自然与生命", title:"小树苗找阳光",
    tags:["自然","坚持","希望"],
    preview:"大石头压住了小树苗，它还能长大吗？",
    bg:"山坡上有一颗小树苗，她刚刚从土里钻出来，嫩嫩的、绿绿的。旁边有一块大石头。",
    problem:"大石头挡住了太阳，小树苗一直照不到光，叶子变得有点黄。她好想快快长大，可是怎么也长不高。",
    action:"小树苗想了又想，决定把根往旁边弯，再把小枝往石头边缝里伸过去，一点一点向着有光的地方靠近。",
    twist:"有一天下了大雨，雨水把石头旁边的泥土冲松了，石头滚开了一点点——阳光终于照进来了！",
    result:"小树苗喝到了阳光，绿油油地长高了。她懂得：只要一直朝着光走，总有一天会到达。",
    guide:["小树苗的麻烦是什么？","她是怎么做的？","你遇到困难时，会怎么想办法？"],
    retell:["山坡上有一棵……","它的麻烦是……","最后它……"]
  },
  /* 3 - 自然与生命 */
  {
    id:3, emoji:"🐸", dim:"自然与生命", title:"青蛙宝宝怕冬天",
    tags:["自然","季节","勇气"],
    preview:"冬天要来了，小青蛙第一次要冬眠，他好害怕……",
    bg:"池塘边，小青蛙呱呱刚出生没多久。秋天到了，叶子变黄了，风越来越凉。",
    problem:"妈妈说：「冬天要来了，我们要睡一个长长的觉，叫冬眠。」呱呱从没睡过那么久，心里很害怕：「睡着了还能醒来吗？」",
    action:"妈妈陪他去找了一个温暖的泥洞，给他盖上厚厚的泥土，还唱了一首摇篮曲。呱呱闭上眼睛，慢慢平静下来。",
    twist:"呱呱做了一个好长好长的梦，梦里全是春天的荷花和飞舞的蜻蜓。然后他感觉脸上有阳光……",
    result:"春天来了！呱呱睁开眼睛，精神抖擞。他跳出泥洞，看见了绿油油的荷叶，开心地叫：「呱呱！我醒了！」",
    guide:["呱呱为什么害怕？","妈妈是怎么帮助他的？","你睡觉前害怕过什么？妈妈怎么帮你的？"],
    retell:["小青蛙呱呱住在……","他遇到的问题是……","冬天过去后他……"]
  },
  /* 4 - 友谊与合作 */
  {
    id:4, emoji:"🐻", dim:"友谊与合作", title:"两只小熊的玩具",
    tags:["分享","矛盾","和解"],

let currentIdx = 0;
let currentFilter = "all";

/* ── RENDER CARDS ── */
function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let visible = 0;
  stories.forEach((s, i) => {
    const show = currentFilter === 'all' || s.dim === currentFilter;
    const dc = DIM_COLOR[s.dim] || '';
    const de = DIM_EMOJI[s.dim] || '';
    const card = document.createElement('div');
    card.className = 'story-card' + (show ? '' : ' hidden');
    card.style.animationDelay = (i * 0.03) + 's';
    card.innerHTML = `
      <div class="sc-num">No.${s.id}</div>
      <span class="sc-emoji">${s.emoji}</span>
      <span class="sc-dim ${dc}">${de} ${s.dim}</span>
      <div class="sc-title">${s.title}</div>
      <div class="sc-preview">${s.preview}</div>
      <div class="sc-tags">${s.tags.map(t => `<span class="sc-tag">${t}</span>`).join('')}</div>
      <div class="sc-open">👉 点击阅读故事</div>`;
    card.onclick = () => openStory(i);
    grid.appendChild(card);
    if (show) visible++;
  });
  document.getElementById('empty').style.display = visible === 0 ? 'block' : 'none';
}

/* ── FILTER ── */
function filter(btn) {
  document.querySelectorAll('.ftag').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  currentFilter = btn.dataset.dim;
  renderCards();
}

/* ── MODAL ── */
function openStory(idx) {
  currentIdx = idx;
  renderModal(idx);
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modal').scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function renderModal(idx) {
  const s = stories[idx];
  const dc = DIM_COLOR[s.dim] || '';
  const de = DIM_EMOJI[s.dim] || '';
  const sc = STEP_COLORS;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-num">第 ${s.id} 个故事 / 共 ${stories.length} 个</div>
    <span class="modal-emoji">${s.emoji}</span>
    <div class="modal-title">${s.title}</div>
    <span class="modal-dim ${dc}">${de} ${s.dim}</span>

    <div class="story-section">
      <div class="ss-header">
        <div class="ss-icon" style="background:${sc[0]};color:#fff">①</div>
        <div><div class="ss-step">步骤①</div><div class="ss-name">🌍 背景 — 谁在哪里？</div></div>
      </div>
      <div class="ss-body">${s.bg}</div>
    </div>

    <div class="story-section">
      <div class="ss-header">
        <div class="ss-icon" style="background:${sc[1]};color:#fff">②</div>
        <div><div class="ss-step">步骤②</div><div class="ss-name">😟 问题 — 遇到什么麻烦？</div></div>
      </div>
      <div class="ss-body">${s.problem}<br><br><span style="color:var(--muted);font-size:.82rem">💡 <em>行动参考：</em>${s.action}</span></div>
    </div>

    <div class="story-section">
      <div class="ss-header">
        <div class="ss-icon" style="background:${sc[2]};color:#fff">③</div>
        <div><div class="ss-step">步骤③</div><div class="ss-name">🏆 结果 — 最后怎样了？</div></div>
      </div>
      <div class="ss-body">${s.result}</div>
    </div>

    <div class="guide-box">
      <div class="guide-title">👨‍👩‍👧 家长引导提问</div>
      ${s.guide.map(q => `<div class="guide-q">${q}</div>`).join('')}
    </div>

    <div class="retell-box">
      <div class="retell-title">🎤 孩子复述提示（说说看）</div>
      ${s.retell.map((r, i) => `<div class="retell-step"><div class="retell-dot">${i+1}</div><span>${r}</span></div>`).join('')}
    </div>
  `;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === stories.length - 1;
}

function navigate(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx >= 0 && newIdx < stories.length) {
    currentIdx = newIdx;
    renderModal(newIdx);
    document.getElementById('modal').scrollTop = 0;
  }
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('overlay').classList.contains('open')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
});

renderCards();
</script>
